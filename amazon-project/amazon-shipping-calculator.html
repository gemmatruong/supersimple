<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Amazon Shipping Calculator</title>
        <style>
            body {
                font-family: Arial;
            }

            .cost-input {
                font-size: 16px;
                padding: 10px;
            }

            .calculate-button {
                border: none;
                background-color: green;
                color: white;
                padding: 12px 20px;
                font-size: 16px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <h1>Amazon Shipping Calculator</h1>
        <p>Orders under $40 = +$10 shipping.</p>
        <p>Orders over $40 = FREE shipping.</p>
        <input placeholder="Cost of order" class="js-cost-input cost-input" onkeydown="
            handleCostKeydown(event);
        ">
        <button onclick="
            calculateTotal();
        " class="calculate-button">Calculate</button>
        <p class="js-total"></p>
    </body>

    <script>
        function handleCostKeydown(event) {
            if (event.key === 'Enter') {
                calculateTotal();
            }
        }

        function calculateTotal() {
            const input = document.querySelector('.js-cost-input');
            let cost = Number(input.value);

            if (cost < 40) {
                cost += 10;
            }
            document.querySelector('.js-total').innerHTML = `$${cost}`;
        }
    </script>
</html>
