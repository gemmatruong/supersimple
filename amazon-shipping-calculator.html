<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Amazon Shipping Calculator</title>
    </head>
    <body>
        <h1>Amazon Shipping Calculator</h1>
        <p>Orders under $40 = +$10 shipping.</p>
        <p>Orders over $40 = FREE shipping.</p>
        <input placeholder="Cost of order" class="js-cost-input" onkeydown="">
        <button onclick="
            calculateTotal();
        ">Calculate</button>
        <p class="js-total"></p>
    </body>

    <script>
        function calculateTotal() {
            const input = document.querySelector('.js-cost-input');
            let cost = Number(input.value);

            if (cost < 40) {
                cost += 10;
            }
            document.querySelector('.js-total').innerHTML = `$${cost}`;
        }
    </script>
</html>
