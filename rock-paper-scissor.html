<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Rock Paper Scissor</title>
    </head>
    <body>
        <h1>Rock Paper Scissor</h1>
        <button onclick="playGame('rock')">Rock</button>
        <button onclick="playGame('paper')">Paper</button>
        <button onclick="playGame('scissor')">Scissor</button>
        <p class="js-result"></p>
        <p class="js-moves"></p>
        <p class="js-scores"></p>
        <button onclick="
            score.wins = 0;
            score.loses = 0;
            score.ties = 0;
            localStorage.removeItem('score');
            updateScoreElement();
        ">Reset Score</button>
    </body>
    
    <script>
        const score = JSON.parse(localStorage.getItem('score')) || { wins: 0, loses: 0, ties: 0 };

        updateScoreElement();

        function playGame(choice) {
            const computerChoice = computerMove();
            let result = '';
            
            if (choice === computerChoice) {
                score.ties++;
                result = 'Tie.';
            } else if (
                (choice === 'rock' && computerChoice === 'scissor') ||
                (choice === 'paper' && computerChoice === 'rock') ||
                (choice === 'scissor' && computerChoice === 'paper')
            ) {
                score.wins++;
                result = 'You win!';
            } else {
                score.loses++;
                result = 'You lose!';
            }

            localStorage.setItem('score', JSON.stringify(score));

            updateScoreElement();

            document.querySelector('.js-result').innerHTML = result;

            document.querySelector('.js-moves').innerHTML = `You ${choice}  -  ${computerChoice} Computer`;
        }

        function updateScoreElement() {
            document.querySelector('.js-scores').innerHTML = `Wins: ${score.wins}, Loses: ${score.loses}, Ties: ${score.ties}`;
        }

        function computerMove() {
            const randomNumber = Math.random();

            if (randomNumber >=0 && randomNumber < 1/3) {
                return 'rock';
            } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
                return 'paper';
            } else {
                return 'scissor';
            }
        }
    </script>
</html>
